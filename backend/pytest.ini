[pytest]
DJANGO_SETTINGS_MODULE = minersentinel.settings_test
# django_find_project = false prevents auto-discovery conflicts when running under CI PYTHONPATH + explicit settings_test
django_find_project = false
python_files = test_*.py tests.py *_test.py
python_classes = Test*
python_functions = test_*
testpaths = api/tests
addopts =
    --strict-markers
    --cov=api
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=60
    -ra
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may touch DB more)
    slow: Slow running tests (external mocks heavy)