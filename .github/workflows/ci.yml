# GitHub Actions CI for MinerSentinel
# Runs tests for Frontend (Vitest), Backend (Django + pytest), and Data Service (pytest)
#
# Design note:
# We call pytest directly (instead of `make test-*`) for transparency and to stay
# consistent with the existing .gitlab-ci.yml, which also invokes pytest directly.
# The Makefile remains the recommended way to run tests *locally* for developers.

name: CI

on:
  push:
    branches: [main, master, feature/*, fix/*]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # FRONTEND (React + Vite + Vitest)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint
        continue-on-error: true   # Do not block on lint warnings for now

      - name: Run tests
        run: npm run test:run

      - name: Build (smoke test)
        run: npm run build
        env:
          # Vite build should succeed even without real API endpoints
          VITE_API_BASE_URL: '/api'

  # ─────────────────────────────────────────────────────────────────────────────
  # BACKEND (Django + pytest-django, SQLite in-memory for tests)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-test.txt -r backend/requirements-dev.txt

      - name: Run backend tests (direct pytest, matching GitLab CI)
        run: |
          python -m pytest backend/api/tests \
            -v --tb=short \
            -c pyproject.toml \
            --ds=minersentinel.settings_test
        env:
          PYTHONPATH: backend
          DJANGO_SETTINGS_MODULE: minersentinel.settings_test

  # ─────────────────────────────────────────────────────────────────────────────
  # DATA SERVICE (Flask collectors + pytest, unit tests only)
  # ─────────────────────────────────────────────────────────────────────────────
  data-service:
    name: Data Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            data-service/requirements.txt
            data-service/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-service/requirements.txt
          pip install -r data-service/requirements-dev.txt

      - name: Run data-service tests (direct pytest, skipping integration tests)
        run: |
          python -m pytest data-service/tests \
            -v --tb=short \
            -c pyproject.toml \
            -m "not integration"
        env:
          PYTHONPATH: data-service

  # ─────────────────────────────────────────────────────────────────────────────
  # Optional: Docker Compose validation (non-blocking)
  # ─────────────────────────────────────────────────────────────────────────────
  validate-docker:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    continue-on-error: true   # Informational only

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose files
        run: |
          docker compose config --quiet
          docker compose -f docker-compose.prod.yml config --quiet 2>/dev/null || echo "prod compose has optional issues (expected in some envs)"
          echo "✅ docker-compose files are syntactically valid"

  # ─────────────────────────────────────────────────────────────────────────────
  # Summary job (useful for branch protection rules)
  # ─────────────────────────────────────────────────────────────────────────────
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [frontend, backend, data-service, validate-docker]
    if: always()
    steps:
      - name: Check all test jobs
        run: |
          if [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.backend.result }}" != "success" ] || \
             [ "${{ needs.data-service.result }}" != "success" ]; then
            echo "❌ One or more CI jobs failed"
            exit 1
          fi
          echo "✅ All CI jobs passed (or were allowed to fail)"
